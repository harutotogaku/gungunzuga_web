name: Update Poster Gallery

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # 👇 ここが超重要！ロボットにファイル上書き（Write）の権限を与える
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 👈 ついでに黄色い警告を消すために24に変更

      - name: Install dependencies
        run: npm install

      - name: Create credentials.json from secret
        run: |
          echo '${{ secrets.GDRIVE_CREDENTIALS }}' > credentials.json

      - name: Fetch images from Google Drive
        run: node fetch.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 自動更新：ギャラリーにポスターを追加しました"
          git push